<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Products</title>

<style>

body{
  font-family: system-ui;
  padding:20px;
}

h2{
  margin-bottom:12px;
}

.toolbar{
  margin-bottom:16px;
}

button{
  padding:8px 14px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-size:13px;
}

.primary{
  background:#111;
  color:white;
}

.secondary{
  background:#eee;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
}

th{
  text-align:left;
  background:#fafafa;
}

</style>

</head>

<body>

<h2>Products</h2>

<div class="toolbar">

<button id="btnImportProducts" class="primary">
Import Products Excel
</button>

<button id="btnReload" class="secondary">
Reload
</button>

</div>

<table>

<thead>
<tr>
<th>Barcode</th>
<th>Name</th>
<th>Category</th>
<th>Price</th>
<th>Cost</th>
<th>Stock</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script>

async function loadProducts(){

  const rows = await window.api.productsGet()

  const tbody = document.getElementById("tbody")

  tbody.innerHTML = ""

  rows.forEach(p=>{

    const tr = document.createElement("tr")

    tr.innerHTML = `
      <td>${p.barcode}</td>
      <td>${p.item_name}</td>
      <td>${p.category || ""}</td>
      <td>${p.unit_price_usd || ""}</td>
      <td>${p.cost_usd || ""}</td>
      <td>${p.stock_quantity || 0}</td>
    `

    tbody.appendChild(tr)

  })

}

document.getElementById("btnReload").addEventListener("click",loadProducts)

document.getElementById("btnImportProducts").addEventListener("click",async()=>{

  const result = await window.api.productsImportExcel()

  if(!result) return

  alert(`Imported ${result.count} products`)

  loadProducts()

})

loadProducts()

</script>

</body>
</html>
